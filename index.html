<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>DEV Foundation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:#e5e7eb;
margin:0;
display:flex;
min-height:100vh;
}

/* MENU */
nav{
width:230px;
background:#111827;
padding:20px;
display:flex;
flex-direction:column;
}

/* Barre recherche */
#search-bar{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:20px;
font-size:16px;
}

/* Liens menu */
nav a{
color:#22c55e;
text-decoration:none;
font-weight:bold;
margin:10px 0;
font-size:18px;
padding:8px;
border-radius:6px;
}

nav a:hover{
background:#1f2937;
}

/* Menu personnalisable */
#custom-menu{
display:none;
margin-top:15px;
padding-top:10px;
border-top:1px solid #22c55e;
}

.sub-section{
display:none;
margin-top:10px;
background:#1f2937;
border-radius:8px;
padding:10px;
}

.sub-section a{
display:block;
margin:6px 0;
}

/* Contenu */
.main-content{
flex:1;
padding:40px;
}

/* Header */
header{
text-align:center;
}

header h1{
font-size:36px;
margin:0;
}

header p{
color:#94a3b8;
font-size:20px;
}

/* Footer */
footer{
text-align:center;
margin-top:50px;
color:#94a3b8;
}
</style>
</head>

<body>

<nav>

<input type="text" id="search-bar" placeholder="Rechercher...">

<a href="#accueil">Accueil</a>

<a href="textures.html">Textures Marketplace</a>

<a href="#contact">Contact</a>

<a id="custom-toggle">Personnaliser le menu</a>

<div id="custom-menu">

<p>Outils en cours de développement</p>

<div class="sub-section" id="future-tools">
<a href="asset-tool.html">Assets & Textures 3D</a>
<a href="seamless-tool.html">Outil Seamless</a>
<a href="assistant.html">Assistant IA</a>
</div>

<button onclick="toggleFutureTools()">Afficher / Masquer les outils</button>

</div>

</nav>

<div class="main-content">

<header id="accueil">
<h1>DEV FOUNDATION</h1>
<p>Le marketplace qui évolue grâce à vous</p>
</header>

<footer id="contact">
© 2025 DEV FOUNDATION | Contact: dev.foundation.contact@gmail.com
</footer>

</div>

<script>

const customToggle=document.getElementById("custom-toggle");
const customMenu=document.getElementById("custom-menu");

customToggle.onclick=()=>{
customMenu.style.display=
customMenu.style.display==="block"?"none":"block";
};

function toggleFutureTools(){

const future=document.getElementById("future-tools");

future.style.display=
future.style.display==="block"?"none":"block";

}

</script>

</body>
  </html>
