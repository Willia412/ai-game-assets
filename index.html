<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>DEV Foundation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  margin: 0;
  display: flex;
  min-height: 100vh;
}

/* MENU VERTICAL */
nav {
  width: 220px;
  background: #111827;
  padding: 20px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* Barre de recherche */
#search-bar {
  width: 90%;
  padding: 8px 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 20px;
  font-size: 16px;
}

/* Liens du menu */
nav a {
  color: #22c55e;
  text-decoration: none;
  font-weight: bold;
  margin: 12px 0;
  font-size: 18px;
  width: 100%;
  text-align: center;
  cursor: pointer;
}

nav a:hover {
  text-decoration: underline;
}

/* Partie personnalisable */
#custom-menu {
  display: none;
  margin-top: 20px;
  width: 100%;
  background: #111827;
  border-top: 1px solid #22c55e;
  padding: 10px 0;
  text-align: center;
  border-radius: 8px;
}

.sub-section {
  display: none;
  margin-top: 10px;
  background: #1f2937;
  border-radius: 8px;
  padding: 10px;
  font-size: 16px;
  color: #94a3b8;
}

.sub-section a {
  display: block;
  margin: 5px 0;
  color: #22c55e;
  text-decoration: none;
}

.sub-section a:hover {
  text-decoration: underline;
}

/* CONTENU PRINCIPAL */
.main-content {
  flex: 1;
  padding: 40px 20px;
}

/* HEADER */
header {
  text-align: center;
  padding-bottom: 40px;
}

header h1 {
  margin: 0;
  font-size: 36px;
}

header p {
  color: #94a3b8;
  font-size: 20px;
  margin-top: 10px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #0b1220;
  margin-top: 50px;
  color: #94a3b8;
}
</style>
</head>

<body>

<!-- MENU VERTICAL -->
<nav>
  <input type="text" id="search-bar" placeholder="Rechercher...">
  <a href="#accueil">Accueil</a>
  <a href="#contact">Contact</a>
  <a id="custom-toggle">Personnaliser le menu</a>

  <!-- Partie personnalisable -->
  <div id="custom-menu">
    <p>Outils en cours de développement</p>

    <div class="sub-section" id="future-tools">
      <a href="asset-tool.html">Assets & Textures 3D</a>
      <a href="seamless-tool.html">Outil Seamless</a>
      <a href="assistant.html">Assistant IA</a>
    </div>

    <button onclick="toggleFutureTools()">Afficher / Masquer les outils</button>
  </div>
</nav>

<div class="main-content">

<header id="accueil">
  <h1>DEV FOUNDATION</h1>
  <p>Le marketplace qui évolue grâce à vous</p>
</header>

<footer id="contact">
  © 2025 DEV FOUNDATION | Contact: dev.foundation.contact@gmail.com
</footer>

<script>
// Toggle partie personnalisable principale
const customToggle = document.getElementById('custom-toggle');
const customMenu = document.getElementById('custom-menu');

customToggle.addEventListener('click', () => {
  customMenu.style.display = (customMenu.style.display === 'none' || customMenu.style.display === '') ? 'block' : 'none';
});

// Toggle future tools
function toggleFutureTools() {
  const future = document.getElementById('future-tools');
  future.style.display = (future.style.display === 'none' || future.style.display === '') ? 'block' : 'none';
}

// Recherche simple du menu
const searchBar = document.getElementById('search-bar');
searchBar.addEventListener('input', () => {
  const filter = searchBar.value.toLowerCase();
  const links = document.querySelectorAll('nav a:not(#custom-toggle)');
  links.forEach(link => {
    if (link.textContent.toLowerCase().includes(filter)) {
      link.style.display = 'block';
    } else {
      link.style.display = 'none';
    }
  });
});
</script>

</body>
  </html>
