<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>DEV Foundation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  margin: 0;
  display: flex;
  min-height: 100vh;
}

/* MENU VERTICAL */
nav {
  width: 200px;
  background: #111827;
  padding-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

nav a {
  color: #22c55e;
  text-decoration: none;
  font-weight: bold;
  margin: 15px 0;
  font-size: 18px;
}

nav a:hover {
  text-decoration: underline;
}

/* CONTENU PRINCIPAL */
.main-content {
  flex: 1;
  padding: 40px 20px;
}

/* TITRE */
header {
  text-align: center;
  padding-bottom: 40px;
}

header h1 {
  margin: 0;
  font-size: 36px;
}

header p {
  color: #94a3b8;
  font-size: 20px;
  margin-top: 10px;
}

/* MARKETPLACE */
.marketplace {
  max-width: 900px;
  margin: 40px auto;
  padding: 0 20px;
}

.card {
  background: #111827;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  text-align: center;
}

.price {
  color: #22c55e;
  font-weight: bold;
  margin-top: 10px;
}

.buy-btn {
  background: #22c55e;
  color: #020617;
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 15px;
}

.buy-btn:hover {
  background: #16a34a;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #0b1220;
  margin-top: 50px;
  color: #94a3b8;
}
</style>
</head>

<body>

<!-- MENU VERTICAL -->
<nav>
  <a href="#accueil">Accueil</a>
  <a href="#marketplace">Marketplace</a>
  <a href="#contact">Contact</a>
</nav>

<div class="main-content">

<header id="accueil">
  <h1>Bienvenue sur DEV FOUNDATION</h1>
  <p>Le marketplace qui évolue grâce à vous</p>
</header>

<section class="marketplace" id="marketplace">
  <div class="card">
    <h3>Pack Texture Sol Rocheux</h3>
    <p>Textures réalistes pour Unity, Unreal et jeux mobiles</p>
    <p class="price">Prix : 0,05 USDT</p>

    <button class="buy-btn" 
      onclick="window.open('https://nowpayments.io/embeds/payment-widget?iid=4754618608','_blank')">
      Acheter maintenant
    </button>
  </div>
</section>

<footer id="contact">
  © 2025 DEV FOUNDATION | Contact: dev.foundation.contact@gmail.com
</footer>

</div>

</body>
</html>
