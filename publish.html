<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Publier</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
}

.form{
max-width:500px;
margin:auto;
background:#111827;
padding:20px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
margin-top:15px;
padding:10px;
background:#22c55e;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="form">
<h2>Publier un asset</h2>

<form id="form">

<input type="text" id="name" placeholder="Nom asset" required>
<input type="text" id="shop" placeholder="Nom boutique" required>

<select id="category">
<option value="texture">Texture</option>
<option value="audio">Audio</option>
<option value="animation">Animation</option>
</select>

<input type="text" id="format" placeholder="Format (PNG, MP3...)">

<select id="price">
<option value="free">Gratuit</option>
<option value="premium">Premium</option>
</select>

<button type="submit">Publier</button>

</form>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA5YO60-A0IH5gZFRXCNtj-gg1AyW2-T_U",
authDomain: "dev-foundation.firebaseapp.com",
projectId: "dev-foundation",
storageBucket: "dev-foundation.firebasestorage.app",
messagingSenderId: "1089648631721",
appId: "1:1089648631721:web:d9932e4606240aedc16eb8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

await addDoc(collection(db,"assets"),{
name: document.getElementById("name").value,
shop: document.getElementById("shop").value,
category: document.getElementById("category").value,
format: document.getElementById("format").value,
price: document.getElementById("price").value
});

alert("Publié !");
e.target.reset();
});

</script>

</body>
</html>
