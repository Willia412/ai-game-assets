<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>DEV STOCK SHOP</title>

<style>
body{
font-family:Arial;
background:#020617;
color:white;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#0f172a;
padding:15px;
border-radius:10px;
}

img{
width:100%;
height:180px;
object-fit:cover;
}

button{
background:#22c55e;
border:none;
padding:10px;
margin-top:10px;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<h1>DEV STOCK SHOP</h1>

<div class="grid" id="assetsContainer"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA...",
authDomain: "dev-foundation.firebaseapp.com",
projectId: "dev-foundation",
storageBucket: "dev-foundation.firebasestorage.app",
messagingSenderId: "1089648631721",
appId: "1:1089648631721:web:d9932e4606240aedc16eb8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadAssets(){

const snapshot = await getDocs(collection(db,"assets"));

const container=document.getElementById("assetsContainer");

container.innerHTML="";

snapshot.forEach(doc=>{

let a=doc.data();

container.innerHTML+=`
<div class="card">

<img src="${a.image}">

<h3>${a.name}</h3>
<p>${a.description}</p>

<p>${a.type}</p>
<p>${a.price}</p>

<a href="${a.file}" target="_blank">
<button>Télécharger</button>
</a>

</div>
`;

});

}

loadAssets();

</script>

</body>
</html>
