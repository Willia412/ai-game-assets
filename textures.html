<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>DEV STOCK SHOP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  margin: 0;
  padding: 0;
}

/* HEADER */
header {
  background: #0b1220;
  padding: 40px 20px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 36px;
}

header p {
  color: #94a3b8;
  font-size: 20px;
  margin-top: 10px;
}

/* MENU */
.menu-bar {
  background: #111827;
  padding: 10px;
  text-align: center;
}

.menu-btn {
  background: #22c55e;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

.menu-content {
  display: none;
  background: #020617;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
}

.menu-content a {
  display: block;
  color: #22c55e;
  text-decoration: none;
  padding: 6px 0;
}

/* SEARCH */
.search {
  text-align: center;
  margin: 20px 0;
}

.search input {
  width: 80%;
  max-width: 400px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

/* FILTRES HORIZONTAUX */
.filters {
  display: flex;
  overflow-x: auto;
  padding: 10px 20px;
  gap: 10px;
}

.filters button {
  background: #22c55e;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  white-space: nowrap;
  flex-shrink: 0;
}

.filters button:hover {
  background: #16a34a;
}

/* LISTING LATÉRAL */
.listing {
  position: fixed;
  right: 0;
  top: 150px;
  width: 200px;
  background: #111827;
  padding: 10px;
  border-radius: 8px 0 0 8px;
  max-height: 70%;
  overflow-y: auto;
}

.listing h3 {
  margin-top: 0;
  color: #22c55e;
}

.listing button {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  color: #020617;
  font-weight: bold;
}

.listing button:hover {
  background: #16a34a;
}

/* GRILLE ASSETS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
  padding: 20px;
  margin-right: 220px; /* espace pour listing */
}

.card {
  background: #111827;
  border-radius: 6px;
  padding: 10px;
  min-height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.card h4 {
  margin: 5px 0;
  font-size: 16px;
  text-align: center;
}

.card p {
  font-size: 12px;
  color: #94a3b8;
  text-align: center;
}

/* FOOTER */
footer {
  background: #0b1220;
  text-align: center;
  padding: 20px;
  margin-top: 40px;
}
</style>
</head>

<body>

<header>
<h1>DEV STOCK SHOP</h1>
<p>Le marketplace qui évolue grâce à vous</p>
</header>

<!-- MENU -->
<div class="menu-bar">
<button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
<div id="menu" class="menu-content">
<a href="index.html">Accueil</a>
<a href="contact.html">Contact</a>
<a href="publish.html">Publier un Asset</a>
</div>
</div>

<!-- RECHERCHE -->
<div class="search">
<input type="text" id="searchInput" placeholder="Rechercher vos assets...">
</div>

<!-- FILTRES HORIZONTAUX -->
<div class="filters">
<button onclick="setFilter('all')">Tout</button>
<button onclick="setFilter('gratuit')">Gratuit</button>
<button onclick="setFilter('premium')">Premium</button>
<button onclick="setFilter('ia')">Type IA</button>
<button onclick="setFilter('texture')">Texture</button>
<button onclick="setFilter('musique')">Musique</button>
<button onclick="setFilter('animation')">Animation</button>
<button onclick="setFilter('projet')">Projet non terminé</button>
<button onclick="setFilter('photo')">Photo brute</button>
</div>

<!-- LISTING LATÉRAL -->
<div class="listing">
<h3>Filtrer par format</h3>
<button onclick="setListing('3D')">3D</button>
<button onclick="setListing('2D')">2D</button>
<button onclick="setListing('PNG')">PNG</button>
<button onclick="setListing('MP3')">MP3</button>
<button onclick="setListing('Blend')">Blend</button>
<button onclick="setListing('Autre')">Autre</button>
</div>

<!-- GRILLE DES ASSETS -->
<div class="grid" id="grid">
<!-- Les cards seront générées automatiquement ici -->
</div>

<footer>
© 2025 DEV FOUNDATION
</footer>

<script>
// Toggle menu
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display==="block" ? "none" : "block";
}

// Variables de filtrage
let filterCategoryValue = 'all';
let filterListingValue = 'all';

// Filtre horizontal
function setFilter(cat) {
  filterCategoryValue = cat;
  displayAssets();
}

// Filtre listing
function setListing(listing) {
  filterListingValue = listing;
  displayAssets();
}

// Recherche
const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("input", () => displayAssets());

// Génération dynamique des assets depuis localStorage
function displayAssets() {
  const grid = document.getElementById("grid");
  grid.innerHTML = '';

  const assets = JSON.parse(localStorage.getItem('assets')) || [];
  const searchTerm = searchInput.value.toLowerCase();

  assets.forEach(asset => {
    // Filtrage combiné
    if ((filterCategoryValue === 'all' || asset.category === filterCategoryValue) &&
        (filterListingValue === 'all' || asset.format === filterListingValue) &&
        (asset.name.toLowerCase().includes(searchTerm) || asset.shopName.toLowerCase().includes(searchTerm))) {
      
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h4>${asset.name}</h4>
        <p>${asset.category} - ${asset.format}</p>
        <p>${asset.creation}</p>
      `;
      grid.appendChild(card);
    }
  });
}

// Initialisation
displayAssets();
</script>

</body>
</html>
