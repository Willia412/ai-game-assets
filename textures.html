<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<title>DEV STOCK SHOP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:#e5e7eb;
margin:0;
padding:0;
}

/* HEADER */

header{
background:#0b1220;
padding:40px 20px;
text-align:center;
}

header h1{
margin:0;
font-size:36px;
}

header p{
color:#94a3b8;
font-size:20px;
margin-top:10px;
}

/* MENU */

.menu-bar{
background:#111827;
padding:10px;
text-align:center;
}

.menu-btn{
background:#22c55e;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.menu-content{
display:none;
background:#020617;
margin-top:10px;
padding:10px;
border-radius:8px;
}

.menu-content a{
display:block;
color:#22c55e;
text-decoration:none;
padding:8px 0;
}

/* SEARCH */

.search{
text-align:center;
margin:20px 0;
}

.search input{
width:80%;
max-width:400px;
padding:10px;
border:none;
border-radius:8px;
font-size:16px;
}

/* FILTRES HORIZONTAUX */

.filters{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px 20px;
}

.filters button{
background:#22c55e;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
white-space:nowrap;
}

.filters button:hover{
background:#16a34a;
}

/* LAYOUT */

.container{
display:flex;
}

/* ASSET EXPLORER */

.sidebar{
width:220px;
background:#111827;
padding:20px;
}

.sidebar h3{
margin-top:0;
color:#22c55e;
}

.sidebar button{
display:block;
width:100%;
margin:6px 0;
padding:8px;
background:#1f2937;
border:none;
color:#e5e7eb;
border-radius:6px;
cursor:pointer;
text-align:left;
}

.sidebar button:hover{
background:#374151;
}

/* GRID ASSETS */

.grid{
flex:1;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111827;
height:150px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
color:#94a3b8;
}

/* FOOTER */

footer{
background:#0b1220;
text-align:center;
padding:20px;
margin-top:40px;
}

</style></head><body><header>

<button onclick="filterType('ui')">UI Sounds</button>

</div><!-- GRID --><div class="grid" id="grid"><div class="card">Asset</div>

}

</script></body>
