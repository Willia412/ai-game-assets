<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>DEV STOCK SHOP - Texture</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

/* Barre du haut */

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
background:#111;
color:white;
padding:10px 20px;
}

.logo{
font-size:18px;
font-weight:bold;
}

/* Bouton menu */

.menu-btn{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

/* Menu déroulant */

.menu{
display:none;
position:absolute;
top:50px;
right:20px;
background:white;
border:1px solid #ccc;
}

.menu a{
display:block;
padding:10px 20px;
text-decoration:none;
color:black;
}

.menu a:hover{
background:#eee;
}

/* Barre recherche */

.search{
padding:20px;
text-align:center;
}

.search input{
width:60%;
padding:10px;
font-size:16px;
}

/* Grille textures */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
height:150px;
border-radius:6px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">DEV STOCK SHOP</div>

<button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>

<div class="menu" id="menu">
<a href="index.html">Accueil</a>
<a href="contact.html">Contact</a>
</div>

</div>

<div class="search">
<input type="text" placeholder="Rechercher texture...">
</div>

<div class="grid">

<div class="card"></div>
<div class="card"></div>
<div class="card"></div>
<div class="card"></div>
<div class="card"></div>
<div class="card"></div>

</div>

<script>

function toggleMenu(){
let menu=document.getElementById("menu");
if(menu.style.display==="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}
}

</script>

</body>
</html>
