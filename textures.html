<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<title>DEV STOCK SHOP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:#e5e7eb;
margin:0;
}

/* HEADER */

header{
background:#0b1220;
padding:40px 20px;
text-align:center;
}

header h1{
margin:0;
font-size:36px;
}

header p{
color:#94a3b8;
font-size:18px;
margin-top:10px;
}

/* MENU */

.menu-bar{
background:#111827;
padding:10px;
text-align:center;
}

.menu-btn{
background:#22c55e;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.menu-content{
display:none;
margin-top:10px;
}

.menu-content a{
display:block;
padding:6px;
color:#22c55e;
text-decoration:none;
}

/* SEARCH */

.search{
text-align:center;
margin:20px;
}

.search input{
width:80%;
max-width:400px;
padding:10px;
border-radius:8px;
border:none;
}

/* FILTRES */

.filters{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px 20px;
}

.filters button{
background:#22c55e;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
white-space:nowrap;
}

/* BOUTON LISTING */

.listing-toggle{
position:fixed;
right:10px;
top:160px;
background:#22c55e;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
z-index:10;
}

/* MENU LISTING */

.listing{
position:fixed;
right:-220px;
top:200px;
width:200px;
background:#111827;
padding:10px;
border-radius:8px 0 0 8px;
transition:0.3s;
}

.listing.active{
right:0;
}

.listing button{
width:100%;
margin:5px 0;
padding:8px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111827;
border-radius:8px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:6px;
}

.card h4{
margin:8px 0;
}

.card p{
font-size:13px;
color:#94a3b8;
}

.card button{
margin-top:8px;
padding:8px 10px;
border:none;
background:#22c55e;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* FOOTER */

footer{
background:#0b1220;
text-align:center;
padding:20px;
margin-top:40px;
}

</style></head><body><header>
<h1>DEV STOCK SHOP</h1>
<p>Le marketplace qui évolue grâce à vous</p>
</header><div class="menu-bar">
<button class="menu-btn" onclick="toggleMenu()">☰ Menu</button><div id="menu" class="menu-content">
<a href="index.html">Accueil</a>
<a href="contact.html">Contact</a>
<a href="publish.html">Publier un Asset</a>
</div>
</div><div class="search">
<input type="text" id="searchInput" placeholder="Rechercher vos assets...">
</div><div class="filters"><button onclick="setFilter('all')">Tout</button>
<button onclick="setFilter('gratuit')">Gratuit</button>
<button onclick="setFilter('premium')">Premium</button>
<button onclick="setFilter('ia')">Type IA</button>
<button onclick="setFilter('texture')">Texture</button>
<button onclick="setFilter('musique')">Musique</button>
<button onclick="setFilter('animation')">Animation</button>
<button onclick="setFilter('projet')">Projet</button>
<button onclick="setFilter('photo')">Photo</button>

</div><button class="listing-toggle" onclick="toggleListing()">Formats</button>

<div id="listing" class="listing"><button onclick="setListing('3D')">3D</button>
<button onclick="setListing('2D')">2D</button>
<button onclick="setListing('PNG')">PNG</button>
<button onclick="setListing('MP3')">MP3</button>
<button onclick="setListing('Blend')">Blend</button>
<button onclick="setListing('Autre')">Autre</button>

</div><div class="grid" id="grid"></div><footer>
© 2025 DEV FOUNDATION
</footer><script>

function toggleMenu(){
const menu=document.getElementById("menu");
menu.style.display=menu.style.display==="block"?"none":"block";
}

function toggleListing(){
const listing=document.getElementById("listing");
listing.classList.toggle("active");
}

let filterCategoryValue='all';
let filterListingValue='all';

function setFilter(cat){
filterCategoryValue=cat;
displayAssets();
}

function setListing(list){
filterListingValue=list;
displayAssets();
}

const searchInput=document.getElementById("searchInput");

searchInput.addEventListener("input",displayAssets);

function displayAssets(){

const grid=document.getElementById("grid");
grid.innerHTML='';

const assets=JSON.parse(localStorage.getItem('assets'))||[];

const searchTerm=searchInput.value.toLowerCase();

assets.forEach(asset=>{

if((filterCategoryValue==='all'||asset.category===filterCategoryValue)&&
(filterListingValue==='all'||asset.format===filterListingValue)&&
(asset.name.toLowerCase().includes(searchTerm)||asset.shopName.toLowerCase().includes(searchTerm))){

const card=document.createElement('div');
card.className='card';

card.innerHTML=`
<img src="${asset.preview}">
<h4>${asset.name}</h4>
<p>${asset.category} • ${asset.format}</p>
<p>Prix : ${asset.price}</p>
<button>Télécharger</button>
<p>${asset.creation}</p>
`;

grid.appendChild(card);

}

});

}

displayAssets();

</script></body>
  </html>
